<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Inc.</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

.btn{
  padding:10px 20px;
  margin:10px;
  cursor:pointer;
}

.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.box{
  background:#222;
  padding:20px;
  width:90%;
  max-width:600px;
  max-height:80vh;
  overflow:auto;
}
</style>
</head>

<body>

<h1>Spectrum Inc.</h1>

<button class="btn" onclick="openPublish()">Website</button>
<button class="btn">Web App</button>
<button class="btn">APK</button>
<button class="btn" onclick="openApp()">App</button>

<!-- SELECT -->
<div id="publishPopup" class="popup">
<div class="box">
<h2>Select</h2>
<button onclick="openGithub()">GitHub</button>
<button onclick="openGoogle()">Google</button>
<br><br>
<button onclick="closePublish()">Close</button>
</div>
</div>

<!-- GITHUB -->
<div id="githubPopup" class="popup">
<div class="box">
<h2>GitHub Plans</h2>

<p>BASIC ₹2000</p>
<p>1–3 pages, responsive, contact form, SEO</p>

<p>PREMIUM ₹3000–₹5000</p>
<p>4–7 pages, custom design, media</p>

<p>ULTIMATE ₹5000–₹8000+</p>
<p>Unlimited pages, animations, ecommerce</p>

<br>
<button onclick="closeGithub()">Close</button>
</div>
</div>

<!-- GOOGLE -->
<div id="googlePopup" class="popup">
<div class="box">
<h2>Google Plans</h2>

<table border="1" width="100%">
<tr><th>Plan</th><th>Price</th></tr>
<tr><td>Basic</td><td>₹2000</td></tr>
<tr><td>Premium</td><td>₹3000–₹5000</td></tr>
<tr><td>Ultimate</td><td>₹5000–₹8000+</td></tr>
</table>

<br>
<button onclick="closeGoogle()">Close</button>
</div>
</div>

<!-- APP -->
<div id="appPopup" class="popup">
<div class="box">
<h2>Coming Soon</h2>
<button onclick="closeApp()">Close</button>
</div>
</div>

<script>
function openPublish(){
document.getElementById("publishPopup").style.display="flex";
}

function closePublish(){
document.getElementById("publishPopup").style.display="none";
}

function openGithub(){
closePublish();
document.getElementById("githubPopup").style.display="flex";
}

function closeGithub(){
document.getElementById("githubPopup").style.display="none";
}

function openGoogle(){
closePublish();
document.getElementById("googlePopup").style.display="flex";
}

function closeGoogle(){
document.getElementById("googlePopup").style.display="none";
}

function openApp(){
document.getElementById("appPopup").style.display="flex";
}

function closeApp(){
document.getElementById("appPopup").style.display="none";
}
</script>

</body>
</html>
